name: Testing...
on:
  push:
jobs:
  ng_test:
    name: Run unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
      - run: npm install --force
      - run: npm install -g @ionic/cli
      - name: Run unit-tests
        run: npm run test
      - name: Build App
        run: ionic build
        timeout: 5
