name: Testing...
on:
  push:
jobs:
  linting:
    name: Run Lint check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
      - run: npm install
      - run: npm install -g @ionic/cli
      - name: Run unit-tests
        run: ng test
      - name: Build App
        run: ionic build
